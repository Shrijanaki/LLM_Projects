threshold: 0.55
max_jobs: 50
output_dir: outputs
tracking:
  csv_path: tracking.csv
  google_sheets:
    enabled: false
    spreadsheet_id: ""
    worksheet: "Applications"
    service_account_json: ""

application:
  allow_auto_submit: false
  headless: false

sources:
  - type: greenhouse_json
    name: "Greenhouse Board"
    url: "https://boards-api.greenhouse.io/v1/boards/<board_token>/jobs?content=true"
  - type: lever_json
    name: "Lever Board"
    url: "https://api.lever.co/v0/postings/<company>?mode=json"
  - type: generic_html
    name: "Custom Board"
    url: "https://example.com/careers"
    selectors:
      job_card: ".job"
      title: ".job-title"
      location: ".job-location"
      description: ".job-description"
      link: "a"
